name: AI日报自动推送

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  send-daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 lxml

      - name: 运行日报脚本
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WX_TEST_APPID: ${{ secrets.WX_TEST_APPID }}
          WX_TEST_SECRET: ${{ secrets.WX_TEST_SECRET }}
          WX_TEST_OPENIDS: ${{ secrets.WX_TEST_OPENIDS }}
        run: |
          python src/main.py
