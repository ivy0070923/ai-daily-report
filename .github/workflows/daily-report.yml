name: AI日报自动推送

on:
  schedule:
    - cron: '50 23 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  send-daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 lxml

      - name: 运行日报脚本
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WX_TEST_APPID: ${{ secrets.WX_TEST_APPID }}
          WX_TEST_SECRET: ${{ secrets.WX_TEST_SECRET }}
          WX_TEST_OPENIDS: ${{ secrets.WX_TEST_OPENIDS }}
          GITHUB_PAGES_URL: https://ivy0070923.github.io/ai-daily-report/
        run: |
          python src/main.py

      - name: 发布到 GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: send-daily-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
